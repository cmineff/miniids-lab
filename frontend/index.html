<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniIDS Lab — Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>🛡️ MiniIDS Lab</h2>
                <span>Detecção de Intrusão</span>
            </div>
            <a href="index.html" class="active">📊 Dashboard</a>
            <a href="events.html">📡 Eventos</a>
            <a href="alerts.html">🚨 Alertas</a>
            <a href="rules.html">📋 Regras</a>
            <div class="sidebar-footer">
                <button onclick="logout()">Sair</button>
            </div>
        </aside>
        <main class="main-content">
            <h1 class="page-title">Dashboard</h1>
            <div class="cards-grid">
                <div class="card">
                    <div class="card-label">Total de Eventos</div>
                    <div class="card-value" id="total-events">-</div>
                </div>
                <div class="card">
                    <div class="card-label">Total de Alertas</div>
                    <div class="card-value danger" id="total-alerts">-</div>
                </div>
                <div class="card">
                    <div class="card-label">Alertas Abertos</div>
                    <div class="card-value warning" id="open-alerts">-</div>
                </div>
                <div class="card">
                    <div class="card-label">Regras Ativas</div>
                    <div class="card-value success" id="total-rules">-</div>
                </div>
            </div>
            <div class="table-container">
                <div class="table-header">Alertas Recentes</div>
                <table>
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>IP Origem</th>
                            <th>Severidade</th>
                            <th>Status</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="recent-alerts">
                        <tr><td colspan="5" class="loading">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
